<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charts — BareMetalJsTools</title>
  <link rel="stylesheet" href="../src/BareMetalStyles.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header site-header-dark">
      <a class="brand" href="index.html">🔩 BareMetalJsTools</a>
      <nav>
        <a href="layout.html">Layout</a>
        <a href="components.html">Components</a>
        <a href="charts.html" class="active">Charts</a>
        <a href="graph.html">Graph</a>
      </nav>
    </header>

    <main class="main-content p-4" style="overflow-y:auto;">
      <div class="container">
        <h2 class="mb-4">Charts</h2>

        <div class="row g-3">
          <!-- Bar Chart -->
          <div class="col-md-6">
            <div class="card">
              <div class="card-header fw-semibold">Bar Chart</div>
              <div class="card-body">
                <div id="bar-chart"></div>
              </div>
            </div>
          </div>

          <!-- Horizontal Bar -->
          <div class="col-md-6">
            <div class="card">
              <div class="card-header fw-semibold">Horizontal Bar</div>
              <div class="card-body">
                <div id="hbar-chart"></div>
              </div>
            </div>
          </div>

          <!-- Line Chart -->
          <div class="col-md-6">
            <div class="card">
              <div class="card-header fw-semibold">Line Chart</div>
              <div class="card-body">
                <div id="line-chart"></div>
              </div>
            </div>
          </div>

          <!-- Smooth Line -->
          <div class="col-md-6">
            <div class="card">
              <div class="card-header fw-semibold">Smooth Multi-Series</div>
              <div class="card-body">
                <div id="smooth-chart"></div>
              </div>
            </div>
          </div>

          <!-- Donut -->
          <div class="col-md-4">
            <div class="card">
              <div class="card-header fw-semibold">Donut Chart</div>
              <div class="card-body text-center">
                <div id="donut-chart"></div>
              </div>
            </div>
          </div>

          <!-- Gauge -->
          <div class="col-md-4">
            <div class="card">
              <div class="card-header fw-semibold">Gauge — CPU</div>
              <div class="card-body text-center">
                <div id="gauge-cpu"></div>
              </div>
            </div>
          </div>

          <!-- Gauge with zones -->
          <div class="col-md-4">
            <div class="card">
              <div class="card-header fw-semibold">Gauge — Temperature</div>
              <div class="card-body text-center">
                <div id="gauge-temp"></div>
              </div>
            </div>
          </div>

          <!-- Sparklines -->
          <div class="col-12">
            <div class="card">
              <div class="card-header fw-semibold">Sparklines</div>
              <div class="card-body">
                <div class="d-flex gap-3 align-items-center flex-wrap">
                  <div>
                    <div class="small text-muted mb-1">Revenue</div>
                    <div id="spark-1"></div>
                  </div>
                  <div>
                    <div class="small text-muted mb-1">Users</div>
                    <div id="spark-2"></div>
                  </div>
                  <div>
                    <div class="small text-muted mb-1">Errors</div>
                    <div id="spark-3"></div>
                  </div>
                  <div>
                    <div class="small text-muted mb-1">Latency</div>
                    <div id="spark-4"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Live update demo -->
        <div class="card mt-3 mb-4">
          <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
            Live Gauge
            <button class="btn btn-sm btn-outline-primary" id="randomize-btn">Randomize</button>
          </div>
          <div class="card-body text-center">
            <div id="gauge-live" class="d-inline-block"></div>
          </div>
        </div>

      </div>
    </main>

    <footer class="site-footer site-footer-dark text-center">
      © 2026 Will Eastbury · <a href="https://github.com/WillEastbury/BareMetalJsTools">BareMetalJsTools</a>
    </footer>
  </div>

  <script src="../src/BareMetalCharts.js"></script>
  <script>
    // Bar chart
    BareMetalCharts.bar('#bar-chart', [
      { label: 'Jan', value: 30 }, { label: 'Feb', value: 55 },
      { label: 'Mar', value: 42 }, { label: 'Apr', value: 68 },
      { label: 'May', value: 51 }, { label: 'Jun', value: 73 }
    ]);

    // Horizontal bar
    BareMetalCharts.bar('#hbar-chart', [
      { label: 'React', value: 85 }, { label: 'Vue', value: 62 },
      { label: 'Angular', value: 48 }, { label: 'Svelte', value: 35 },
      { label: 'Vanilla', value: 95 }
    ], { horizontal: true });

    // Line chart
    BareMetalCharts.line('#line-chart', [
      { label: 'Mon', value: 12 }, { label: 'Tue', value: 19 },
      { label: 'Wed', value: 15 }, { label: 'Thu', value: 25 },
      { label: 'Fri', value: 22 }, { label: 'Sat', value: 30 },
      { label: 'Sun', value: 28 }
    ]);

    // Multi-series smooth line
    BareMetalCharts.line('#smooth-chart', [
      { name: 'Desktop', values: [40, 55, 48, 62, 58, 72, 68] },
      { name: 'Mobile',  values: [20, 35, 42, 38, 52, 48, 60] }
    ], { smooth: true, labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'] });

    // Donut
    BareMetalCharts.donut('#donut-chart', [
      { label: 'CSS', value: 34 }, { label: 'JS', value: 45 },
      { label: 'HTML', value: 21 }
    ], { centerText: '100', centerLabel: 'files' });

    // Gauges
    BareMetalCharts.gauge('#gauge-cpu', 72, { label: 'CPU %' });

    BareMetalCharts.gauge('#gauge-temp', 38, {
      min: 0, max: 80, label: '°C',
      zones: [
        { from: 0, to: 30, color: '--bs-success' },
        { from: 30, to: 55, color: '--bs-warning' },
        { from: 55, to: 80, color: '--bs-danger' }
      ]
    });

    // Sparklines
    BareMetalCharts.sparkline('#spark-1', [3,7,4,8,5,9,6,10,8,12], { color: '--bs-success', fill: true });
    BareMetalCharts.sparkline('#spark-2', [10,12,11,14,13,15,14,16], { color: '--bs-primary' });
    BareMetalCharts.sparkline('#spark-3', [2,1,3,2,5,3,2,1,4,2], { color: '--bs-danger', fill: true });
    BareMetalCharts.sparkline('#spark-4', [45,42,48,44,46,43,47,45], { color: '--bs-warning' });

    // Live gauge
    function renderLive(v) {
      BareMetalCharts.gauge('#gauge-live', v, {
        size: 300, min: 0, max: 100, label: 'Load %',
        zones: [
          { from: 0, to: 40, color: '--bs-success' },
          { from: 40, to: 70, color: '--bs-warning' },
          { from: 70, to: 100, color: '--bs-danger' }
        ]
      });
    }
    renderLive(55);
    document.getElementById('randomize-btn').addEventListener('click', () => {
      renderLive(Math.round(Math.random() * 100));
    });
  </script>
</body>
</html>
