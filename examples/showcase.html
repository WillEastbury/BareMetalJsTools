<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PicoShop — a BareMetal platform showcase</title>
<link href="../src/BareMetalStyles.min.css" rel="stylesheet">
<style>
  :root { --ink:#1b2330; --muted:#5b6675; --line:#e2e6ee; --accent:#3b5bdb; --bg:#f6f8fc; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; color: var(--ink); background: var(--bg); }
  header { background: #0d1424; color: #fff; padding: 14px 22px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; margin: 0; letter-spacing: .3px; }
  header .tag { font-size: 12px; color: #9db2ff; }
  nav { display: flex; gap: 4px; padding: 10px 22px 0; background: #fff; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  nav a { padding: 8px 14px; font-size: 14px; text-decoration: none; color: var(--muted); border-bottom: 2px solid transparent; }
  nav a.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  main { max-width: 1000px; margin: 0 auto; padding: 22px; }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 16px 18px; margin-bottom: 18px; }
  .card h2 { font-size: 15px; margin: 0 0 4px; }
  .card p.sub { margin: 0 0 12px; color: var(--muted); font-size: 13px; }
  .pill { display: inline-block; font-size: 11px; background: #eef2ff; color: var(--accent); padding: 2px 8px; border-radius: 999px; margin-left: 6px; }
  button.bt { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 7px 12px; font-size: 13px; cursor: pointer; }
  button.ghost { background: #fff; color: var(--accent); border: 1px solid #c7d2fe; border-radius: 6px; padding: 7px 12px; font-size: 13px; cursor: pointer; }
  pre { background: #0c0e14; color: #9fb0c8; padding: 10px; border-radius: 8px; font-size: 12px; overflow: auto; white-space: pre-wrap; }
  table.pico-report { border-collapse: collapse; font-size: 14px; width: 100%; }
  table.pico-report th, table.pico-report td { border: 1px solid var(--line); padding: 5px 12px; text-align: left; }
  table.pico-report thead th { background: #f0f3fa; }
  table.pico-report tfoot td { font-weight: 700; background: #f7f9ff; }
  .pico-form-row { display: flex; gap: 14px; flex-wrap: wrap; margin: 6px 0; }
  .pico-field { display: flex; flex-direction: column; font-size: 12px; color: var(--muted); }
  .pico-field input { border: 1px solid #c7d2fe; border-radius: 5px; padding: 4px 6px; font-size: 14px; color: var(--ink); }
  .bm-report-preview { margin-top: 10px; }
  .bm-report-text { display: none; }
  .bm-report-bar { gap: 6px !important; }
  .bm-report-bar .bt, .bm-report-col .bt, .bm-report-agg .bt { background:#fff; color:var(--ink); border:1px solid var(--line); }
  .log { font-size: 12px; font-family: ui-monospace, monospace; }
  .log div { padding: 3px 0; border-bottom: 1px dashed var(--line); }
  .log .ev { color: var(--accent); font-weight: 600; }
  .muted { color: var(--muted); font-size: 12px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .stack { display: grid; gap: 4px; }
</style>
</head>
<body>
<header>
  <h1>🛠️ PicoShop</h1>
  <span class="tag">a small app built entirely from the BareMetal suite — one deterministic bytecode underneath</span>
</header>
<nav id="nav">
  <a href="#/build">1 · Logic (Workflow → PicoScript)</a>
  <a href="#/report">2 · Report</a>
  <a href="#/form">3 · Form (edit &amp; save)</a>
  <a href="#/activity">4 · Activity (events)</a>
</nav>
<main id="view"></main>

<!-- The real BareMetal suite modules -->
<script src="../src/BareMetal.PubSub.js"></script>
<script src="../src/BareMetal.Routing.js"></script>
<script src="../src/BareMetal.PicoScript.js"></script>
<script src="../src/BareMetal.WorkflowPico.js"></script>
<script src="../src/BareMetal.Workflow.js"></script>
<script src="../src/BareMetal.Report.js"></script>
<script>
(function () {
  'use strict';
  var Bus = BareMetal.PubSub;
  var WP = BareMetal.WorkflowPico;
  var Report = BareMetal.Report;

  // ---- shared app state ------------------------------------------------------
  // Stage 1: an "orders" workflow (the visual/logic layer) that materialises line
  // items [qty, price] into memory and emits them. This is the data producer.
  var ordersFlow = [
    { type: 'SET', name: 'lines', value: [2, 10, 3, 20, 1, 50] },
    { type: 'FOREACH', var: 'v', in: 'lines' },
    { type: 'LOG', message: 'v' },
    { type: 'END' }
  ];
  // Stage 2: the report/form layout template (Qty, Price columns + totals).
  var template = {
    title: 'Orders',
    mode: 'report',
    columns: [
      { label: 'Qty', field: 0, width: 6, format: 'int', editable: true },
      { label: 'Price', field: 1, width: 7, format: 'int', editable: true }
    ],
    aggregates: [{ column: 0, fn: 'sum' }, { column: 1, fn: 'sum' }]
  };
  var orderData = [2, 10, 3, 20, 1, 50];
  var activity = [];

  // Every meaningful action publishes to the bus; the Activity tab subscribes (ON).
  function log(ev, msg) { activity.unshift({ ev: ev, msg: msg, t: new Date().toLocaleTimeString() }); }
  Bus.on('**', function (data, meta) {
    var topic = (meta && meta.topic) || 'event';
    log(topic, typeof data === 'object' ? JSON.stringify(data) : String(data));
  });

  var view = document.getElementById('view');
  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  // ---- View 1: Logic — compile the workflow to PicoScript and run it ---------
  function viewBuild() {
    view.innerHTML =
      '<div class="card"><h2>The data producer is a <b>visual workflow</b> <span class="pill">BareMetal.WorkflowPico</span></h2>' +
      '<p class="sub">These steps materialise the order lines into PicoScript <code>Memory</code> and emit each value. ' +
      '<b>Compile</b> turns them into deterministic bytecode that runs on the same VM as bare metal, PIOS and the C# host.</p>' +
      '<pre id="steps">' + esc(JSON.stringify(ordersFlow, null, 2)) + '</pre>' +
      '<div class="row"><button class="bt" id="compile">Compile &amp; Run ▶</button>' +
      '<span class="muted">Workflow → English PicoScript → bytecode → VM output</span></div>' +
      '<div id="out"></div></div>';
    document.getElementById('compile').onclick = function () {
      var res;
      try { res = WP.run(ordersFlow, { pico: BareMetal.PicoScript }); }
      catch (e) { document.getElementById('out').innerHTML = '<pre style="color:#f88">' + esc(e.message) + '</pre>'; return; }
      orderData = decodeInts(res.output);
      document.getElementById('out').innerHTML =
        '<h2 style="margin-top:14px">Generated PicoScript (English dialect)</h2>' +
        '<pre>' + esc(res.source) + '</pre>' +
        '<h2>VM output (the order data)</h2><pre>[' + orderData.join(', ') + ']</pre>' +
        (res.warnings.length ? '<p class="muted">' + res.warnings.length + ' warning(s)</p>' : '');
      Bus.emit('flow.compiled', { words: res.words.length, values: orderData.length });
    };
  }

  // Decode the VM output buffer (Print writes 4-byte big-endian ints).
  function decodeInts(output) {
    var bytes = [];
    (output || []).forEach(function (c) {
      if (Array.isArray(c) || (typeof Uint8Array !== 'undefined' && c instanceof Uint8Array)) { for (var i = 0; i < c.length; i++) bytes.push(c[i] & 255); }
      else bytes.push(c & 255);
    });
    var out = [];
    for (var j = 0; j + 4 <= bytes.length; j += 4) out.push(((bytes[j] << 24) | (bytes[j + 1] << 16) | (bytes[j + 2] << 8) | bytes[j + 3]) | 0);
    return out;
  }

  // ---- View 2: Report — the visual report designer over the workflow data ----
  function viewReport() {
    view.innerHTML =
      '<div class="card"><h2>Design a <b>report</b> over the workflow output <span class="pill">BareMetal.Report</span></h2>' +
      '<p class="sub">Pick the <b>workflow</b> data source and hit <b>Load</b>, or edit columns/aggregates live. ' +
      'The same template renders identically in the PicoScript toolchain (byte-aligned engine).</p>' +
      '<div id="designer"></div></div>';
    var d = Report.designer(document.getElementById('designer'), {
      data: orderData,
      template: template,
      source: { kind: 'workflow', steps: ordersFlow }
    });
    d.element.addEventListener('bm:report-change', function (e) { template = e.detail.template; });
    d.element.addEventListener('bm:report-data', function (e) { orderData = e.detail.data; Bus.emit('report.loaded', { rows: e.detail.data.length }); });
  }

  // ---- View 3: Form — edit the same data read-write, then save (write-back) ---
  function viewForm() {
    view.innerHTML =
      '<div class="card"><h2>Edit an order as a <b>form</b> <span class="pill">read-write layout</span></h2>' +
      '<p class="sub">The exact same template, rendered read-write. <b>Save</b> collects the inputs, maps them back ' +
      'through the data ABI, and raises an event.</p>' +
      '<div id="formHost"></div>' +
      '<div class="row" style="margin-top:12px"><button class="bt" id="save">Save order 💾</button>' +
      '<span class="muted" id="savemsg"></span></div></div>';
    var ctl = Report.render(document.getElementById('formHost'), orderData, template, { mode: 'form' });
    document.getElementById('save').onclick = function () {
      var rows = ctl.collect();
      orderData = Report.flatten(rows);
      var writes = Report.toWrites(rows, { base: 0 });
      document.getElementById('savemsg').textContent = 'saved ' + rows.length + ' rows → data ABI: ' + JSON.stringify(writes);
      Bus.emit('order.saved', { rows: rows.length, total: orderData.reduce(function (a, b) { return a + b; }, 0) });
    };
  }

  // ---- View 4: Activity — the PubSub event log (ON/subscribe) -----------------
  function viewActivity() {
    view.innerHTML =
      '<div class="card"><h2>Everything is wired with <b>events</b> <span class="pill">BareMetal.PubSub</span></h2>' +
      '<p class="sub">Compiling, loading and saving all publish to one bus — the same event model workflows RAISE/ON. ' +
      'This log is a live subscriber.</p>' +
      '<div class="log" id="log"></div></div>';
    renderLog();
  }
  function renderLog() {
    var el = document.getElementById('log');
    if (!el) return;
    el.innerHTML = activity.length
      ? activity.map(function (a) { return '<div><span class="ev">' + esc(a.ev) + '</span> · ' + esc(a.msg) + ' <span class="muted">' + a.t + '</span></div>'; }).join('')
      : '<div class="muted">No activity yet — compile a workflow, load a report, or save the form.</div>';
  }
  Bus.on('**', function () { renderLog(); });

  // ---- SPA router (hash mode keeps the demo a single self-contained file) -----
  BMRouter
    .on('/build', viewBuild)
    .on('/report', viewReport)
    .on('/form', viewForm)
    .on('/activity', viewActivity)
    .on('/', viewBuild)
    .notFound(viewBuild);

  function highlight() {
    var hash = location.hash || '#/build';
    document.querySelectorAll('#nav a').forEach(function (a) { a.classList.toggle('active', a.getAttribute('href') === hash); });
  }
  window.addEventListener('hashchange', highlight);
  BMRouter.start({ mode: 'hash' });
  if (!location.hash) location.hash = '#/build';
  highlight();
})();
</script>
</body>
</html>
